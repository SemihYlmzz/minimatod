<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none" role="img" aria-label="Minimatod">
  <!--
    Minimatod mark: an "M" whose inner valley is a checkmark.
    Geometry mirrors lib/core/brand/logo_painter.dart (0..100 design space).
    Uses currentColor so it can be recolored via CSS `color`.
  -->
  <g stroke="currentColor" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <line x1="28" y1="28" x2="28" y2="72" />
    <line x1="72" y1="28" x2="72" y2="72" />
    <polyline points="28,28 46,60 68,18" />
  </g>
</svg>
