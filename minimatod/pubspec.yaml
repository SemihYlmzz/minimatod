name: minimatod
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.2.0+3

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Localization (English + Turkish) generated from ARB files via gen_l10n.
  flutter_localizations:
    sdk: flutter
  intl: any

  # Persists the user's theme + language choices.
  shared_preferences: ^2.3.3

  # Reads the app version/build from the native bundle (single source of truth
  # = pubspec version), shown on the Settings screen.
  package_info_plus: ^8.1.1

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Local persistence for the note/task tree (adjacency list in SQLite).
  sqflite: ^2.4.1
  # SQLite on desktop (FFI) and web (WASM) — same SQL API across all platforms.
  sqflite_common_ffi: ^2.3.4
  sqflite_common_ffi_web: ^1.1.2
  path: ^1.9.1
  uuid: ^4.5.1

  # Native splash runtime API (preserve/remove the splash until data is ready).
  flutter_native_splash: ^2.4.6

  # Open external links (privacy policy, support email, web app).
  url_launcher: ^6.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Generates platform launcher icons from a single source PNG.
  flutter_launcher_icons: ^0.14.4

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0


# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Generate localization classes from lib/l10n/*.arb (see l10n.yaml).
  generate: true

  assets:
    - assets/brand/
    - assets/brand/web/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# Launcher icon generation — run: fvm dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/brand/icon_1024.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#0E0F12"
  adaptive_icon_foreground: "assets/brand/icon_foreground_1024.png"
  adaptive_icon_monochrome: "assets/brand/icon_monochrome_1024.png"
  web:
    generate: true
    image_path: "assets/brand/icon_1024.png"
    background_color: "#0E0F12"
    theme_color: "#0E0F12"

# Native splash generation — run: fvm dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0E0F12"
  image: "assets/brand/splash_logo.png"
  android_12:
    image: "assets/brand/splash_logo.png"
    color: "#0E0F12"
  web: true
